<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚠ SYSTEM ALERT ⚠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mencegah teks dipilih, seperti virus */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0f1e 0%, #000000 100%);
            font-family: 'Courier New', 'Fixedsys', 'MS Gothic', monospace;
            overflow-x: hidden;
            position: relative;
            cursor: crosshair;
            animation: screenFlicker 0.08s infinite;
        }

        /* Efek flicker CRT */
        @keyframes screenFlicker {
            0% { opacity: 0.98; text-shadow: 0 0 2px red; }
            50% { opacity: 1; text-shadow: 0 0 5px #ff0000; }
            100% { opacity: 0.96; text-shadow: 0 0 2px #ff6600; }
        }

        /* container utama dengan glitch */
        .virus-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(1px);
        }

        /* kotak peringatan seperti popup virus */
        .alert-box {
            background: #111111dd;
            border: 3px solid #ff0000;
            border-radius: 24px;
            padding: 20px 25px;
            margin: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), inset 0 0 10px rgba(255,0,0,0.5);
            backdrop-filter: blur(8px);
            text-align: center;
            animation: borderPulse 0.3s infinite alternate, glitchBox 0.2s infinite;
            max-width: 90%;
            width: 550px;
        }

        @keyframes borderPulse {
            0% { border-color: #ff0000; box-shadow: 0 0 15px red; }
            100% { border-color: #ff8800; box-shadow: 0 0 35px #ff5500; }
        }

        @keyframes glitchBox {
            0% { transform: translate(1px, -1px); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, 2px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }

        /* GIF styling */
        .idiot-gif {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            border: 2px solid #ff3300;
            box-shadow: 0 0 20px #ff0000, 0 0 5px #ffaa00 inset;
            margin-bottom: 20px;
            background: black;
            transition: all 0.05s linear;
        }

        /* efek shake pada gif (seperti virus menggoyang) */
        .shake-gif {
            animation: violentShake 0.08s infinite;
        }

        @keyframes violentShake {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(3px, -2px) rotate(0.5deg); }
            50% { transform: translate(-3px, 3px) rotate(-0.3deg); }
            75% { transform: translate(2px, -1px) rotate(0.2deg); }
            100% { transform: translate(0,0); }
        }

        /* teks bombastis */
        .warning-text {
            color: #ff3333;
            font-size: 1.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0px #5a0000, 0 0 8px red;
            margin: 15px 0 10px;
            word-break: keep-all;
            animation: textGlitch 0.15s infinite;
        }

        @keyframes textGlitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; opacity: 1; }
            50% { text-shadow: -3px 0 cyan, 3px 0 magenta; }
            100% { text-shadow: 1px 0 lime, -1px 0 red; }
        }

        .sub {
            color: #ffaa66;
            font-size: 1.1rem;
            background: #1e1e2faa;
            display: inline-block;
            padding: 8px 15px;
            border-radius: 40px;
            margin-top: 10px;
            font-weight: bold;
            border-left: 4px solid red;
            font-family: monospace;
        }

        /* efek fake progress bar kayak virus install */
        .fake-progress {
            margin-top: 20px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            background: #2c2c2c;
            border-radius: 30px;
            padding: 3px;
            border: 1px solid red;
        }

        .progress-fill {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #ff0000, #ff7700);
            border-radius: 30px;
            animation: progressAnim 0.7s infinite alternate ease-in-out;
        }

        @keyframes progressAnim {
            0% { width: 15%; background: #ff0000; }
            50% { width: 85%; background: #ff4444; }
            100% { width: 45%; background: #ffaa22; }
        }

        /* teks random terminal */
        .terminal-lines {
            font-size: 0.75rem;
            color: #0f0;
            background: #000000aa;
            padding: 10px;
            margin-top: 20px;
            border-radius: 12px;
            font-family: monospace;
            text-align: left;
            max-height: 90px;
            overflow-y: hidden;
            white-space: nowrap;
            overflow-x: auto;
            width: 90%;
        }

        /* tombol palsu yang pura-pura bisa ditutup (tapi malah makin ngeselin) */
        .fake-close {
            background: #2c0000;
            color: #ff6666;
            border: 1px solid red;
            padding: 8px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: monospace;
            box-shadow: 0 0 8px red;
        }

        .fake-close:hover {
            background: #550000;
            transform: scale(0.98);
            box-shadow: 0 0 20px red;
            color: white;
        }

        /* banyak popup kecil bergerak */
        .floating-popup {
            position: fixed;
            background: black;
            border: 2px solid #ff3300;
            color: #ff6666;
            font-family: monospace;
            font-weight: bold;
            padding: 8px 14px;
            font-size: 0.8rem;
            z-index: 9999;
            white-space: nowrap;
            box-shadow: 0 0 15px red;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            animation: floatDrift 2s infinite alternate, fadeOutPop 2s forwards;
        }

        @keyframes floatDrift {
            0% { transform: translateX(0px) translateY(0px); }
            100% { transform: translateX(20px) translateY(-30px); }
        }
        @keyframes fadeOutPop {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* efek matrix rain tipis */
        .matrix-bg {
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.2;
        }

        button {
            background: none;
            border: none;
        }

        /* no scroll dan lock body */
        body {
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="matrix-bg" id="matrixCanvas"></div>

<div class="virus-container">
    <div class="alert-box">
        <!-- GIF you are an idiot - menggunakan gif resmi dari giphy / tenor dengan fallback -->
        <img class="idiot-gif shake-gif" id="mainGif" src="https://media1.tenor.com/m/-_bQZmIf5DsAAAAC/you-are-an-idiot-official.gif" alt="YOU ARE AN IDIOT" onerror="this.onerror=null; this.src='https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif';">
        
        <div class="warning-text">⚠ YOU ARE AN IDIOT ⚠</div>
        <div class="sub">>> SYSTEM CORRUPTED <<</div>
        <div class="fake-progress">
            <div class="progress-fill"></div>
        </div>
        <div class="terminal-lines" id="terminalLog">
            > INFECTING MEMORY...<br>
            > COPYING ID10T.VIRUS...
        </div>
        <button class="fake-close" id="fakeCloseBtn">[ CLOSE / IGNORE ]</button>
        <div class="sub" style="font-size:0.7rem; margin-top:12px;">⚠ JANGAN COBA TUTUP ⚠</div>
    </div>
</div>

<script>
    (function() {
        // --- EFEK VIRUS PALSU YANG NGESELIN ---
        
        // 1. Menangani tombol fake close: akan memunculkan lebih banyak notifikasi dan mengacak posisi gif
        const fakeBtn = document.getElementById('fakeCloseBtn');
        const gifElement = document.getElementById('mainGif');
        const alertBox = document.querySelector('.alert-box');
        
        // Fungsi membuat floating popup "You are an idiot"
        function spawnFloatingMessage(text = "⚠ YOU ARE AN IDIOT ⚠", x = null, y = null) {
            const popup = document.createElement('div');
            popup.className = 'floating-popup';
            popup.innerText = text;
            const randX = x !== null ? x : Math.random() * (window.innerWidth - 150);
            const randY = y !== null ? y : Math.random() * (window.innerHeight - 80);
            popup.style.left = randX + 'px';
            popup.style.top = randY + 'px';
            document.body.appendChild(popup);
            setTimeout(() => {
                if(popup && popup.remove) popup.remove();
            }, 2000);
        }
        
        // 2. membuat window shake keseluruhan
        function shakeWindow(level = 4) {
            let originalX = 0, originalY = 0;
            let intensity = level;
            let count = 0;
            const maxShake = 12;
            const interval = setInterval(() => {
                if (count >= maxShake) {
                    document.body.style.transform = '';
                    clearInterval(interval);
                    return;
                }
                const moveX = (Math.random() - 0.5) * intensity;
                const moveY = (Math.random() - 0.5) * intensity;
                document.body.style.transform = `translate(${moveX}px, ${moveY}px)`;
                count++;
                if(count > maxShake/2) intensity = Math.max(1, intensity-0.5);
            }, 35);
        }
        
        // 3. membuat banyak popup dan tambahan efek
        function virusOutbreak() {
            for(let i=0; i<12; i++) {
                setTimeout(() => {
                    spawnFloatingMessage("⚠ IDIOT ALERT ⚠", Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                }, i * 80);
            }
            for(let i=0;i<8;i++) {
                setTimeout(() => {
                    spawnFloatingMessage(">>> YOU ARE STUPID <<<", Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                }, i * 120 + 200);
            }
            // efek ganti posisi gif random
            if(gifElement) {
                gifElement.style.transform = `rotate(${Math.random() * 6 - 3}deg) scale(1.02)`;
                setTimeout(() => {
                    gifElement.style.transform = '';
                }, 300);
            }
            // ubah teks terminal random
            const terminalDiv = document.getElementById('terminalLog');
            if(terminalDiv) {
                let newMsg = "> VIRUS: brain.exe not found<br>> FORMATTING COMMON SENSE...<br>> INFECTING IDIOT.SYS...<br>> PLEASE DO NOT CLOSE...";
                terminalDiv.innerHTML = newMsg + "<br>> [ERROR] CAN'T ESCAPE!";
            }
            shakeWindow(6);
        }
        
        // tambahkan event ke tombol palsu: setiap kali diklik makin parah
        fakeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // spawn lebih banyak notifikasi + ganti teks gila2an
            for(let i=0;i<25;i++) {
                setTimeout(() => {
                    spawnFloatingMessage("🔴 YOU ARE AN IDIOT 🔴", Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                }, i * 50);
            }
            // efek ganti border alert jadi lebih tebal
            alertBox.style.border = "5px solid #ff0000";
            alertBox.style.boxShadow = "0 0 60px red";
            setTimeout(() => {
                alertBox.style.border = "3px solid #ff0000";
            }, 400);
            // menambah dummy progress bar jadi gila
            const progressFill = document.querySelector('.progress-fill');
            if(progressFill) {
                progressFill.style.animation = 'progressAnim 0.15s infinite alternate';
                progressFill.style.width = '95%';
            }
            // mengubah judul tab
            document.title = "⚠ VIRUS DETECTED ⚠ IDIOT!";
            // spawn pesan terminal baris tambahan
            const terminalDiv = document.getElementById('terminalLog');
            terminalDiv.innerHTML += "<br>!! KAMU TIDAK BISA MENUTUP INI !!";
            terminalDiv.scrollTop = terminalDiv.scrollHeight;
            // memicu getaran pada gif
            gifElement.classList.add('shake-gif');
            // membuat 10 gif bayangan? tidak perlu, tapi memunculkan popup berantai
            shakeWindow(8);
            // alert palsu (tapi tidak mengganggu terlalu, biar 'virus vibe')
            setTimeout(() => {
                const fakeAlertDiv = document.createElement('div');
                fakeAlertDiv.style.position = 'fixed';
                fakeAlertDiv.style.bottom = '20px';
                fakeAlertDiv.style.right = '20px';
                fakeAlertDiv.style.backgroundColor = '#111';
                fakeAlertDiv.style.border = '2px solid red';
                fakeAlertDiv.style.padding = '10px';
                fakeAlertDiv.style.zIndex = '10000';
                fakeAlertDiv.style.fontFamily = 'monospace';
                fakeAlertDiv.style.color = '#ff5555';
                fakeAlertDiv.innerText = '[SYSTEM ERROR] 0xID10T - MEMORY LEAK';
                document.body.appendChild(fakeAlertDiv);
                setTimeout(() => fakeAlertDiv.remove(), 1800);
            }, 100);
            // infinite loop palsu efek banyak popup setiap klik
            return false;
        });
        
        // 4. Membuat efek acak berkala seperti virus yang aktif otomatis setiap 4 detik
        setInterval(() => {
            // random floating notif tanpa perlu diklik
            if(Math.random() > 0.5) {
                spawnFloatingMessage("💀 YOU ARE AN IDIOT 💀", Math.random() * window.innerWidth, Math.random() * window.innerHeight);
            }
            if(Math.random() > 0.7) {
                spawnFloatingMessage("🤡 TOTAL IDIOT 🤡", Math.random() * window.innerWidth, Math.random() * window.innerHeight);
            }
            // ubah warna teks sesaat
            const warnText = document.querySelector('.warning-text');
            if(warnText && Math.random() > 0.6) {
                warnText.style.color = "#ffaa44";
                setTimeout(() => warnText.style.color = "#ff3333", 150);
            }
        }, 2800);
        
        // setiap 8 detik fake progress bar blink dan menambah efek 'virus makin kuat'
        setInterval(() => {
            const progressFill = document.querySelector('.progress-fill');
            if(progressFill) {
                progressFill.style.animation = 'none';
                progressFill.style.width = Math.floor(Math.random() * 90 + 10) + '%';
                setTimeout(() => {
                    progressFill.style.animation = 'progressAnim 0.7s infinite alternate ease-in-out';
                }, 100);
            }
            // mengacak teks terminal
            const terminalDiv = document.getElementById('terminalLog');
            const messages = [
                "> INFECTING ID10T.DLL ... DONE<br>> CORRUPTING USER BRAIN...",
                "> VIRUS: you_are_idiot.exe berjalan<br>> SYSTEM LAG TOTAL",
                "> PERINGATAN! IDIOT MODE AKTIF<br>> TIDAK BISA DITUTUP",
                "> KESALAHAN FATAL: PIKIRAN ANDA TIDAK DITEMUKAN",
                "> MEMBUAT COPY VIRUS... 127 INSTANCE",
                "> SELAMAT! ANDA RESMI IDIOT"
            ];
            let randomMsg = messages[Math.floor(Math.random() * messages.length)];
            terminalDiv.innerHTML = randomMsg + "<br>> Press any key to continue... [FAILED]";
            terminalDiv.scrollTop = terminalDiv.scrollHeight;
        }, 5000);
        
        // 5. Efek mouse trail teks idiot (opsional)
        document.addEventListener('mousemove', (e) => {
            if(Math.random() > 0.97) {
                const trail = document.createElement('div');
                trail.innerText = 'IDIOT';
                trail.style.position = 'fixed';
                trail.style.left = e.clientX + 'px';
                trail.style.top = e.clientY + 'px';
                trail.style.color = '#ff0000';
                trail.style.fontSize = '12px';
                trail.style.fontWeight = 'bold';
                trail.style.fontFamily = 'monospace';
                trail.style.pointerEvents = 'none';
                trail.style.zIndex = '99999';
                trail.style.opacity = '0.8';
                trail.style.textShadow = '0 0 3px black';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 400);
            }
        });
        
        // 6. Mencegah beberapa aksi seperti close dengan tombol keyboard (F5, Ctrl+W dll? hanya efek psikologis)
        window.addEventListener('beforeunload', (e) => {
            // efek klasik "virus" ingin tetap stay
            e.preventDefault();
            e.returnValue = '';
            // message modern tidak selalu tampil, tapi akan memicu prompt meninggalkan page
            return "⚠ VIRUS MENCEGAH ANDA KELUAR! Anda adalah IDIOT! ⚠";
        });
        
        // 7. Tambahan canvas matrix efek latar tipis
        const canvas = document.createElement('canvas');
        const matrixDiv = document.getElementById('matrixCanvas');
        matrixDiv.appendChild(canvas);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        const ctx = canvas.getContext('2d');
        const letters = "01IDIOT10VIRUSIDIOT";
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let drops = [];
        for(let i=0;i<columns;i++) drops[i]=1;
        
        function drawMatrix() {
            if(!ctx) return;
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for(let i=0;i<drops.length;i++) {
                let text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i]=0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 70);
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            drops = [];
            for(let i=0;i<columns;i++) drops[i]=1;
        });
        
        // 8. Membuat gif selalu shake (sudah ada class shake-gif), namun tambah random glitch di gif
        setInterval(() => {
            if(gifElement && Math.random() > 0.8) {
                gifElement.style.filter = `hue-rotate(${Math.random() * 30}deg) brightness(${0.8+Math.random()*0.6})`;
                setTimeout(() => {
                    if(gifElement) gifElement.style.filter = '';
                }, 120);
            }
            // sesekali ganti posisi alert box sedikit
            if(Math.random() > 0.85) {
                alertBox.style.transform = `translate(${Math.random() * 6 - 3}px, ${Math.random() * 6 - 3}px)`;
                setTimeout(() => {
                    alertBox.style.transform = '';
                }, 100);
            }
        }, 900);
        
        // 9. Spawn awal beberapa popup setelah load
        setTimeout(() => {
            for(let i=0;i<5;i++) {
                setTimeout(() => {
                    spawnFloatingMessage("🔔 YOU ARE AN IDIOT 🔔", Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                }, i * 200);
            }
            shakeWindow(3);
        }, 500);
        
        // mencegah klik kanan untuk menambah efek ngeselin
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            spawnFloatingMessage("RIGHT CLICK? IDIOT!", e.clientX, e.clientY);
            return false;
        });
        
        // 10. tambahkan pesan di console untuk efek hacker
        console.log("%c⚠ SYSTEM OVERRIDE: YOU_ARE_AN_IDIOT.VIRUS LOADED ⚠", "color: red; font-size: 16px; font-weight: bold;");
        console.log("%cJANGAN COBA MENUTUP!! ANDA TELAH TERINFEKSI", "color: orange;");
        
        // supaya tidak bisa fokus close dengan mudah, setiap kali mencoba memunculkan notifikasi
        setInterval(() => {
            if(document.hidden) {
                // jika tab tidak aktif, tetap memberi efek bunyi? tanpa bunyi biar tidak terlalu invasif, tapi bisa ganti judul
                document.title = "⚠⚠ IDIOT! JANGAN KABUR ⚠⚠";
                setTimeout(() => {
                    if(!document.hidden) document.title = "⚠ YOU ARE AN IDIOT ⚠";
                }, 1000);
            } else {
                if(document.title !== "⚠ YOU ARE AN IDIOT ⚠") document.title = "⚠ YOU ARE AN IDIOT ⚠";
            }
        }, 800);
        
    })();
</script>
</body>
</html>
